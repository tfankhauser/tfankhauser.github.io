<!DOCTYPE HTML>
<html>

        }

            text-align: center;
            color: #333;
            font-size: 8pt;
        }
        
        #ad {
            width: 100%;
            text-align: center;
            margin: 8px 0px;
        }
        
        #tools {
            font-size: 10pt;
            position: absolute;
            left: 0px;
            top: 0px;
        }
        
        #sanity {
            cursor: pointer;
            opacity: 0.5;
            position: relative;
            top: 8px;
            left: 10px;
            padding: 0px;
            float: left;
            color: #000;
        }
        
        #sanity * {
            cursor: pointer;
            margin: 0px;
        }
        
        #sanity:hover {
            opacity: 1;
        }
        
        #sanity label {
            position: relative;
            top: -2px;
        }
        
        #seed {
            float: left;
            position: relative;
            top: 2px;
            left: 4px;
            opacity: 0.5;
        }
        
        #seed:hover {
            opacity: 1;
        }
        
        #log {
            float: left;
            display: inline-block;
            overflow: hidden;
            width: 240px;
            height: 24px;
            background: #333;
            border: 1px solid #666;
            color: transparent;
            font-family: Tahoma, sans-serif;
            padding: 0px;
            font-size: 10px;
            transition: width 0.5s, height 0.5s, color 0.5s;
            -moz-transition: width 0.5s, height 0.5s, color 0.5s;
            /* Firefox 4 */
            -webkit-transition: width 0.5s, height 0.5s, color 0.5s;
            /* Safari and Chrome */
            -o-transition: width 0.5s, height 0.5s, color 0.5s;
            /* Opera */
        }
        
        #log:hover {
            width: 240px;
            height: 240px;
            overflow-y: scroll;
            color: #fff;
        }
        
        #log:before {
            display: block;
            content: 'Log';
            color: #fff;
            padding: 4px 4px 6px 4px;
            width: 32px;
            text-align: center;
        }
        
        #log div {
            margin: 0px;
            padding: 2px 6px;
        }
        
        #log div:nth-child(odd) {
            background: #222;
        }
    </style>

</head>

<body>

    <div id="wrap">
        <div id="text"><label for="seedinput">Seed : </label><input id="seedinput" onkeyup="SetSeed();" type="text" />
        </div>
        <div id="sanity"><label for="toggle"> </label><input id="toggle" type="checkbox" /></div>
    </div>
    </div>
    <div id="ad">
    </div>


    <script>
        function l(what) {
            return document.getElementById(what);
        }

        //Orteil's tasty Choose function
        function C(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        chars = 'abcdefghijkmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        Seed = '.';
        for (var i = 0; i < 10; i++) {
            Seed += C(chars);
        }

        if (l('seedinput').value && l('seedinput').value.charAt(0) != '.') Seed = l('seedinput').value;
        else l('seedinput').value = Seed;

        //seeded random number courtesy of http://davidbau.com/archives/2010/01/30/random_seeds_coded_hints_and_quintillions.html

                for (d = 0; d < g; d++) e = a.S[d], h = h + e + b[d % c] & g - 1, f = a.S[h], a.S[d] = f, a.S[h] = e;

                    a.i = d;

            }

            }

                for (a = f = 0; a < b.length; a++) {

        })([], Math, 256, 6, 52);

        Math.seedrandom(Seed);

        function SetSeed() {
            Seed = l('seedinput').value;
            Math.seedrandom(Seed);
            Generate();
        }
        String.prototype.Cap = function() {
                return this.charAt(0).toUpperCase() + this.slice(1);
            } //just put the first letter in uppercase yo

        //okay so this whole thing is pretty straightforward and not as fancy and complex as it could have been
        Genres = [];

        function Genre(name, actions, things, goals) {
            this.name = name;
            this.actions = actions;
            Genres.push(this);
        }

        //yo no looky-loos

        new Genre(
            ['Ich liebe dich, weil '],


            ['du mich zum glücklichsten Menschen der Welt machst', 'du die wunderschönste Frau der Welt bist', 'du den stärksten Charakter hast, den ich je kennenlernen durfte', 'wir zusammen die unglaublichsten Momente erleben']);

        new Genre(
            ['Ich liebe dich, weil '],


            ['du mit mir die Welt entdeckst', 'du mich aus meiner Comfort-Zone raustreibst', 'du die schönsten Augen der Welt hast', 'du die schönsten Locken der Welt hast', 'ich bei dir die Person sein kann, die ich bin']);

        new Genre(
            ['Ich liebe dich, weil '],


            ['du bei mir die Person bist, die du bist', 'du mein Ein und Alles bist', 'du mich angeschmust hast', 'du immer an meiner Seite stehst', 'du immer hinter mir stehst']);

        new Genre(
            ['Ich liebe dich, weil '],


            ['ich mich bei dir über alles und jeden aufregen kann', 'du mich immer wuschig machst', 'wir zusammen Pflanzen-Parents sind']);

        new Genre(
            ['Ich liebe dich, weil '],


            ['du mich ausgewählt hast', 'du immer ehrlich bist, auch wenn ich es vielleicht nicht hören will', 'dein Lächeln mich verzaubert', 'neben dir aufzuwachen das Schönste ist', 'wir zusammen Faultiere sein können', 'dein Ehrgeiz ansteckend ist', 'du die stärkste Person der Welt bist', 'du mich zum Positiven veränderst']);

        new Genre(
            ['Ich liebe dich, weil '],


            ['wir unsere Sätze vervollständigen', 'wir immer gleiche Gedanken haben', 'du die gerechteste Person bist, die ich kenne', 'wir zusammen trashige Serien schauen können'],
        );

        counter = 0;
        //everything
        allNames = [];
        allActions = [];

        for (var i in Genres) {
            allNames = allNames.concat(Genres[i].name);
            allActions = allActions.concat(Genres[i].actions);
        }

        Sanity = 1;

        function ToggleSanity() {
            if (!l('toggle').checked) {
                Sanity = 0;
                l('sanity').style.color = '#f00';
            } else {
                Sanity = 1;
                l('sanity').style.color = '#fff';
            }
        }

        function Generate() {
            if (counter < 5) {
                var genre = C(Genres);
                var str = '';
                str = C(genre.name) + C(genre.actions);
                str = str.Cap()
                l('text').innerHTML = ('<a href="javascript:Generate();" class="' + (Sanity ? 'sane' : 'insane') + '">' + str + '</a>');
                counter++;
            } else if (counter > 10) {
                var genre = C(Genres);
                var str = '';
                str = C(genre.name) + C(genre.actions);

                l('text').innerHTML = ('<a href="javascript:Generate();" class="' + (Sanity ? 'sane' : 'insane') + '">' + str + '</a>');

                l('text').innerHTML = ('<a href="javascript:Generate();" class="' + (Sanity ? 'sane' : 'insane') + '">' + 'Ich liebe dich, weil du mit mir nach Kopenhagen fährst' + '</a>');

</html>
